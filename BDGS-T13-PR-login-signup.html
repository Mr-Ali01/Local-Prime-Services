<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDGS-T13-MO-auth | Welcome to Prime Local</title>
    
    <!-- Bootstrap 3.4.1 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <!-- Font Awesome 4.7.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />
    <!-- SweetAlert -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert@1.1.3/dist/sweetalert.css">

    <style>
        :root {
            --bdgs-t13-mo-primary: #0F172A; /* Midnight Navy */
            --bdgs-t13-mo-secondary: #F59E0B; /* Vibrant Amber */
            --bdgs-t13-mo-accent: #38BDF8; /* Sky Blue */
            --bdgs-t13-mo-text: #1E293B;
            --bdgs-t13-mo-text-light: #64748B;
            --bdgs-t13-mo-text-muted: #94A3B8;
            --bdgs-t13-mo-bg-white: #FFFFFF;
            --bdgs-t13-mo-bg-soft: #F8FAFC;
            --bdgs-t13-mo-bg-dark: #0F172A;
            --bdgs-t13-mo-transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --bdgs-t13-mo-shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --bdgs-t13-mo-shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bdgs-t13-mo-bg-soft);
            color: var(--bdgs-t13-mo-text);
        }

        .bdgs-t13-mo-theme-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Main Auth Container --- */
        .bdgs-t13-mo-auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .bdgs-t13-mo-auth-card {
            background: var(--bdgs-t13-mo-bg-white);
            width: 100%;
            max-width: 480px;
            border-radius: 30px;
            box-shadow: var(--bdgs-t13-mo-shadow-lg);
            padding: 50px 45px;
            position: relative;
            animation: fadeInCard 0.6s ease-out;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Brand Logo Area */
        .bdgs-t13-mo-brand-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .bdgs-t13-mo-brand-link {
            font-size: 28px;
            font-weight: 800;
            color: var(--bdgs-t13-mo-primary) !important;
            letter-spacing: -1px;
            text-decoration: none !important;
        }

        .bdgs-t13-mo-brand-link span {
            color: var(--bdgs-t13-mo-secondary);
        }

        /* Header Text */
        .bdgs-t13-mo-auth-card h2 {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin: 0 0 10px 0;
            color: var(--bdgs-t13-mo-primary);
        }

        .bdgs-t13-mo-auth-subtitle {
            text-align: center;
            color: var(--bdgs-t13-mo-text-light);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Form Visibility Toggle */
        .bdgs-t13-mo-auth-form { display: none; }
        .bdgs-t13-mo-auth-form.active { display: block; animation: fadeInForm 0.4s ease-in-out; }

        @keyframes fadeInForm { from { opacity: 0; } to { opacity: 1; } }

        /* Form Styling */
        .bdgs-t13-mo-form-group { margin-bottom: 20px; position: relative; }
        .bdgs-t13-mo-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--bdgs-t13-mo-primary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bdgs-t13-mo-input {
            width: 100%;
            height: 52px;
            padding: 10px 18px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: var(--bdgs-t13-mo-transition);
        }

        .bdgs-t13-mo-input:focus {
            border-color: var(--bdgs-t13-mo-primary);
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
        }

        /* Account Type Toggle (Signup) */
        .bdgs-t13-mo-type-toggle {
            display: flex;
            background: #F1F5F9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .bdgs-t13-mo-type-option { flex: 1; }
        .bdgs-t13-mo-type-option input { display: none; }
        .bdgs-t13-mo-type-option label {
            display: block;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 0;
            color: var(--bdgs-t13-mo-text-light);
            transition: var(--bdgs-t13-mo-transition);
        }

        .bdgs-t13-mo-type-option input:checked + label {
            background: white;
            color: var(--bdgs-t13-mo-primary);
            box-shadow: var(--bdgs-t13-mo-shadow-sm);
        }

        /* Password Controls */
        .bdgs-t13-mo-toggle-pass {
            position: absolute;
            right: 18px;
            top: 38px;
            cursor: pointer;
            color: var(--bdgs-t13-mo-text-light);
            font-size: 18px;
            z-index: 5;
        }

        .bdgs-t13-mo-strength-meter {
            height: 4px;
            background: #E2E8F0;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }
        .bdgs-t13-mo-strength-bar { height: 100%; width: 0%; transition: width 0.3s; }

        /* Action Buttons */
        .bdgs-t13-mo-btn-auth {
            width: 100%;
            height: 55px;
            background: var(--bdgs-t13-mo-secondary);
            color: var(--bdgs-t13-mo-primary);
            border: none;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 16px;
            margin-top: 10px;
            transition: var(--bdgs-t13-mo-transition);
            cursor: pointer;
        }

        .bdgs-t13-mo-btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3);
        }

        /* Toggle Links */
        .bdgs-t13-mo-toggle-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--bdgs-t13-mo-text-light);
            border-top: 1px solid #F1F5F9;
            padding-top: 25px;
        }

        .bdgs-t13-mo-toggle-link {
            color: var(--bdgs-t13-mo-primary);
            font-weight: 700;
            text-decoration: none !important;
            cursor: pointer;
            transition: var(--bdgs-t13-mo-transition);
        }

        .bdgs-t13-mo-toggle-link:hover {
            color: var(--bdgs-t13-mo-secondary);
        }

        /* Utils */
        .bdgs-t13-mo-forgot {
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--bdgs-t13-mo-text-light);
            text-decoration: none !important;
        }

        .bdgs-t13-mo-forgot:hover { color: var(--bdgs-t13-mo-primary); }

        .bdgs-t13-mo-trust-info {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--bdgs-t13-mo-text-muted);
        }

        .bdgs-t13-mo-trust-info i { color: #22C55E; margin-right: 3px; }

        @media (max-width: 767px) {
            .bdgs-t13-mo-auth-card { padding: 40px 20px; border-radius: 20px; box-shadow: none; background: transparent; }
        }
    </style>
</head>
<body>

<div class="bdgs-t13-mo-theme-wrapper">
    <!-- Distraction-Free Auth Container -->
    <main class="bdgs-t13-mo-auth-container">
        <div class="bdgs-t13-mo-auth-card">
            
            <div class="bdgs-t13-mo-brand-area">
                <a href="#" class="bdgs-t13-mo-brand-link">PRIME<span>LOCAL</span></a>
            </div>

            <!-- Login View -->
            <div class="bdgs-t13-mo-auth-form active" id="bdgs-t13-mo-view-login">
                <h2>Welcome Back</h2>
                <p class="bdgs-t13-mo-auth-subtitle">Sign in to manage your local experts and bookings.</p>
                
                <form id="login-form">
                    <div class="bdgs-t13-mo-form-group">
                        <label class="bdgs-t13-mo-label">Email Address</label>
                        <input type="email" class="bdgs-t13-mo-input" placeholder="Enter your email" required>
                    </div>
                    <div class="bdgs-t13-mo-form-group">
                        <label class="bdgs-t13-mo-label">Password</label>
                        <input type="password" class="bdgs-t13-mo-input" placeholder="Enter password" required>
                        <i class="fa fa-eye-slash bdgs-t13-mo-toggle-pass"></i>
                    </div>
                    
                    <a href="#" class="bdgs-t13-mo-forgot">Forgot Password?</a>
                    
                    <button type="submit" class="bdgs-t13-mo-btn-auth">Sign In</button>
                </form>

                <div class="bdgs-t13-mo-toggle-footer">
                    Don't have an account? 
                    <span class="bdgs-t13-mo-toggle-link" onclick="toggleAuthView('signup')">Create Account</span>
                </div>
            </div>

            <!-- Signup View -->
            <div class="bdgs-t13-mo-auth-form" id="bdgs-t13-mo-view-signup">
                <h2>Join Prime Local</h2>
                <p class="bdgs-t13-mo-auth-subtitle">Start your journey with the most trusted local marketplace.</p>

                <form id="signup-form">
                    <div class="bdgs-t13-mo-type-toggle">
                        <div class="bdgs-t13-mo-type-option">
                            <input type="radio" name="acc_type" id="customer" checked>
                            <label for="customer">Customer</label>
                        </div>
                        <div class="bdgs-t13-mo-type-option">
                            <input type="radio" name="acc_type" id="provider">
                            <label for="provider">Service Pro</label>
                        </div>
                    </div>

                    <div class="bdgs-t13-mo-form-group">
                        <label class="bdgs-t13-mo-label">Full Name</label>
                        <input type="text" class="bdgs-t13-mo-input" placeholder="John Doe" required>
                    </div>

                    <div class="bdgs-t13-mo-form-group">
                        <label class="bdgs-t13-mo-label">Email Address</label>
                        <input type="email" class="bdgs-t13-mo-input" placeholder="name@example.com" required>
                    </div>

                    <div class="bdgs-t13-mo-form-group">
                        <label class="bdgs-t13-mo-label">Password</label>
                        <input type="password" id="signup-pass" class="bdgs-t13-mo-input" placeholder="••••••••" required>
                        <i class="fa fa-eye-slash bdgs-t13-mo-toggle-pass"></i>
                        <div class="bdgs-t13-mo-strength-meter">
                            <div id="strength-bar" class="bdgs-t13-mo-strength-bar"></div>
                        </div>
                    </div>

                    <button type="submit" class="bdgs-t13-mo-btn-auth" style="background: var(--bdgs-t13-mo-primary); color: white;">Create Account</button>
                </form>

                <div class="bdgs-t13-mo-trust-info">
                    <span><i class="fa fa-check"></i> Verified</span>
                    <span><i class="fa fa-check"></i> Secure</span>
                    <span><i class="fa fa-check"></i> 24/7 Support</span>
                </div>

                <div class="bdgs-t13-mo-toggle-footer">
                    Already have an account? 
                    <span class="bdgs-t13-mo-toggle-link" onclick="toggleAuthView('login')">Sign In Instead</span>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert@1.1.3/dist/sweetalert.min.js"></script>

<script>
    // Global function to toggle between Login and Signup
    function toggleAuthView(target) {
        $('.bdgs-t13-mo-auth-form').removeClass('active');
        if(target === 'login') {
            $('#bdgs-t13-mo-view-login').addClass('active');
        } else {
            $('#bdgs-t13-mo-view-signup').addClass('active');
        }
    }

    $(document).ready(function() {
        // Toggle Password Visibility
        $('.bdgs-t13-mo-toggle-pass').on('click', function() {
            const input = $(this).siblings('input');
            const type = input.attr('type') === 'password' ? 'text' : 'password';
            input.attr('type', type);
            $(this).toggleClass('fa-eye fa-eye-slash');
        });

        // Password Strength Logic for Signup
        $('#signup-pass').on('input', function() {
            const val = $(this).val();
            let score = 0;
            if (val.length > 6) score += 20;
            if (/[A-Z]/.test(val)) score += 30;
            if (/[0-9]/.test(val)) score += 30;
            if (/[^A-Za-z0-9]/.test(val)) score += 20;
            
            const bar = $('#strength-bar');
            bar.css('width', score + '%');
            if (score <= 40) bar.css('background', '#EF4444');
            else if (score <= 70) bar.css('background', '#F59E0B');
            else bar.css('background', '#22C55E');
        });

        // Form Submission Intercept
        $('#login-form, #signup-form').on('submit', function(e) {
            e.preventDefault();
            const action = $(this).attr('id') === 'login-form' ? 'Signing you in...' : 'Creating your account...';
            swal({
                title: action,
                text: "Connecting to Prime Local secure network",
                imageUrl: "https://i.gifer.com/ZZ5H.gif",
                showConfirmButton: false,
                timer: 1500
            });
        });
    });
</script>

</body>
</html>
